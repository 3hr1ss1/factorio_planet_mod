[technology-description]
solar-science-pack=Unlocks the production of Solar Science Packs, enabling more advanced research.
sand-processing=Process coarse sand in a centrifuge to separate valuable elements from silica sand. Also unlocks glass smelting.
silicon-processing=Smelt silicon ore into silicon ingots, the backbone of Mithras manufacturing.
nuclear-artillery=Pack an atomic warhead into an artillery shell for long-range devastation.
short-handed-inserter=Unlocks the Short-Handed Inserter, which places items on the near row of the belt.
solar-energy-mk2=Unlocks the high-output Solar Panel MK2.
dedicated-storage-chest=Unlocks the Dedicated Storage Chest for single-item, near-infinite bot storage.
solar-oven=Unlocks the Solar Oven, a sun-powered furnace with high speed and base productivity.

mithras-sandstorm-visibility-reduction=How much player vision is reduced while inside a sandstorm (0.5 = 50%).
core-mining=Unlocks the Core Miner with basic per-planet recipes that produce stone or coarse-sand. Slower than surface mining but requires no ore deposits.
advanced-core-mining=Unlocks advanced core mining recipes that produce planet-specific ores. Cycles take longer and yield less per second than basic core mining.

