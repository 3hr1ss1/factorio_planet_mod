[entity-description]
assembling-machine-4=An advanced assembling machine capable of crafting complex items with high efficiency.
core-miner=Drills directly into the planet's core to extract ores. What it produces depends on the planet it stands on.
core-pumpjack=Pumps fluid directly out of the planet's core. What it produces depends on the planet it stands on.
dedicated-storage-chest=A logistic storage chest for bot bases. Locks to the first item type placed inside and holds a near-infinite quantity of it; logistic robots deposit and withdraw that item like a normal storage chest. Any other item type is ejected onto the ground.

