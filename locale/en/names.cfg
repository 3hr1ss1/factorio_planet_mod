[technology-description]
planet-discovery-mithras=Unlocks travel to Mithras, a harsh desert world shaped by constant sandstorms. Provides the Core Miner, which extracts coarse sand or stone from anywhere without an ore deposit, and the Core Pumpjack, which pumps ground water directly from the planet's core.
laser-science-pack=Unlocks the production of Laser Science Packs, the primary research pack of Mithras. Crafted from glass and silicon ingots.
sand-processing=Process coarse sand in a centrifuge to separate stone and silica sand. Also unlocks glass smelting from silica sand. Triggered by mining coarse sand for the first time.
silicon-processing=Smelt silicon ore into silicon ingots, the essential crafting material of Mithras. Triggered by mining silicon ore for the first time.
nuclear-artillery=Packs an atomic bomb into an artillery shell for intercontinental devastation. Fireable from standard artillery turrets and wagons.
short-handed-inserter=Unlocks the Short-Handed Inserter, which places items on the front row of the belt instead of the back — ideal for compact builds.
solar-energy-mk2=Unlocks the Solar Panel MK2, a high-output solar panel with a peak power production of 300 kW.
dedicated-storage-chest=Unlocks the Dedicated Storage Chest, a logistic storage chest that locks to a single item type and holds a near-infinite quantity of it. All other item types are ejected onto the ground.
solar-oven=Unlocks the Solar Oven, a sun-powered furnace with crafting speed 4, 50% base productivity, and 4 module slots. Powered by sunlight — does not operate at night.
solar-precision-plant=Unlocks the Solar Precision Plant, a solar-powered science assembler that crafts every base and Space Age science pack — and is the only machine able to craft the Laser Science Pack.
core-mining=Unlocks the Core Miner with basic per-planet recipes that produce stone or coarse sand. Slower than surface mining but requires no ore deposit.
advanced-core-mining=Unlocks advanced Core Miner recipes that yield planet-specific ores. Cycles take longer and produce less per second than the basic recipe, but provide access to ores otherwise unavailable on that planet.

mithras-sandstorm-visibility-reduction=How much player vision is reduced while inside a sandstorm (0.5 = 50%).

