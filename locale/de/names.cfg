[entity-description]
core-miner=Bohrt direkt in den Planetenkern, um Erze zu fördern. Was er produziert, hängt vom Planeten ab, auf dem er steht.
core-pumpjack=Pumpt Flüssigkeit direkt aus dem Planetenkern. Was er produziert, hängt vom Planeten ab, auf dem er steht.
dedicated-storage-chest=Eine Logistik-Lagerkiste für Bot-Basen. Wird auf den ersten eingelagerten Gegenstandstyp gesperrt und lagert eine nahezu unbegrenzte Menge davon. Alle anderen Gegenstandstypen werden auf den Boden geworfen.
ion-dome=Projiziert einen Ionenschild, der alle Gebäude und Spieler in einem 48×48-Felder-Bereich vor Sandstürmen schützt. Benötigt dauerhaft Strom.
solar-precision-plant=Ein sonnenbetriebener Präzisions-Assembler für Wissenschaft. Herstellungsgeschwindigkeit 4, 50% Basisproduktivität, 4 Modulplätze und läuft mit kostenloser Solarenergie. Stellt jedes Wissenschaftspaket aus Basisspiel und Space Age her und ist die einzige Maschine, die das Laser-Wissenschaftspaket herstellen kann. Funktioniert nicht bei Nacht.

