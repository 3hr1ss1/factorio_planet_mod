[technology-description]
planet-discovery-mithras=Schaltet die Reise nach Mithras frei, einer unwirtlichen Wüstenwelt, die von ständigen Sandstürmen geprägt wird. Stellt den Kernbohrer bereit, der überall Grobsand oder Stein abbaut ohne eine Erzlagerstätte zu benötigen, sowie die Kernpumpe, die Grundwasser direkt aus dem Planetenkern pumpt.
laser-science-pack=Schaltet die Produktion von Laser-Wissenschaftspaketen frei, dem primären Forschungspaket von Mithras. Hergestellt aus Glas und Siliziumbarren.
sand-processing=Verarbeite Grobsand in einer Zentrifuge, um Stein und Siliziumsand zu trennen. Schaltet außerdem das Glasschmelzen aus Siliziumsand frei. Wird durch den erstmaligen Abbau von Grobsand ausgelöst.
silicon-processing=Schmelze Siliziumerz zu Siliziumbarren, dem wichtigsten Herstellungsmaterial auf Mithras. Wird durch den erstmaligen Abbau von Siliziumerz ausgelöst.
nuclear-artillery=Packt eine Atombombe in eine Artilleriegranate für interkontinentale Verwüstung. Abfeuerbar von Standard-Artillerietürmen und -waggons.
short-handed-inserter=Schaltet den Kurzarm-Greifer frei, der Gegenstände auf die vordere Reihe des Förderbands legt statt auf die hintere — ideal für kompakte Bauten.
solar-energy-mk2=Schaltet das Solarpanel MK2 frei, ein leistungsstarkes Solarpanel mit einer Spitzenleistung von 300 kW.
dedicated-storage-chest=Schaltet die Dedizierte Lagerkiste frei, eine Logistik-Lagerkiste, die auf einen einzelnen Gegenstandstyp gesperrt wird und eine nahezu unbegrenzte Menge davon lagert. Alle anderen Gegenstandstypen werden auf den Boden geworfen.
solar-oven=Schaltet den Solarofen frei, einen sonnengetriebenen Ofen mit Herstellungsgeschwindigkeit 4, 50% Basisproduktivität und 4 Modulplätzen. Wird durch Sonnenlicht betrieben — funktioniert nicht bei Nacht.
solar-precision-plant=Schaltet die Solare Präzisionsanlage frei, einen solarbetriebenen Wissenschafts-Assembler, der jedes Wissenschaftspaket aus Basisspiel und Space Age herstellt — und als einzige Maschine das Laser-Wissenschaftspaket herstellen kann.
core-mining=Schaltet den Kernbohrer mit grundlegenden planetenspezifischen Rezepten frei, die Stein oder Grobsand produzieren. Langsamer als Oberflächenabbau, benötigt aber keine Erzlagerstätte.
advanced-core-mining=Schaltet erweiterte Kernbohrer-Rezepte frei, die planetenspezifische Erze liefern. Zyklen dauern länger und produzieren weniger pro Sekunde als das Grundrezept, ermöglichen aber Zugang zu Erzen, die sonst auf dem Planeten nicht verfügbar wären.

mithras-sandstorm-visibility-reduction=Wie stark die Sicht des Spielers während eines Sandsturms reduziert wird (0.5 = 50%).

